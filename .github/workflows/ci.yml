name: CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml's Windows-specific target-dir
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache key includes OS so Windows/Linux don't share V8 artifacts
          key: ${{ matrix.os }}

      - name: Install Vulkan software driver (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y mesa-vulkan-drivers

      - name: Format check
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all
